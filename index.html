<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIDATI - Penomoran SPT & SPPD Sekretariat DPRD</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    .card-container { max-width: 650px; margin: 40px auto; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08); padding: 30px; }
    .header-title { color: #0b3c5d; font-weight: 700; text-transform: uppercase; }
    .btn-primary-custom { background-color: #0b3c5d; border-color: #0b3c5d; color: #fff; font-weight: 600; padding: 12px; }
    .btn-primary-custom:hover { background-color: #072a42; color: #fff; }
    .menu-card { border: 2px solid #e9ecef; border-radius: 10px; padding: 25px; transition: 0.3s; cursor: pointer; background: #fff; }
    .menu-card:hover { border-color: #0b3c5d; background-color: #f8f9fa; transform: translateY(-3px); }
    .nomor-box { font-size: 1.3rem; font-weight: 700; color: #155724; border: 2px dashed #28a745; padding: 10px; border-radius: 6px; background: #fff; margin: 10px 0; }
  </style>
</head>
<body>

<div class="container">
  
  <!-- ================= 1. HALAMAN LOGIN ================= -->
  <div id="loginCard" class="card-container">
    <div class="text-center mb-4">
      <h4 class="header-title mb-1">Login SIDATI</h4>
      <p class="text-muted small">Sekretariat DPRD Kabupaten Padang Pariaman</p>
      <hr>
    </div>
    <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
    <form id="loginForm">
      <div class="mb-3">
        <label for="loginNip" class="form-label fw-bold">NIP Pegawai</label>
        <input type="text" id="loginNip" class="form-control" placeholder="Masukkan 18 digit NIP..." required>
      </div>
      <div class="mb-3">
        <label for="loginPassword" class="form-label fw-bold">Password</label>
        <input type="password" id="loginPassword" class="form-control" placeholder="Masukkan password..." required>
      </div>
      <button type="submit" id="btnLogin" class="btn btn-primary-custom w-100 mt-2">Masuk Aplikasi</button>
    </form>
  </div>

  <!-- ================= 2. DASHBOARD MENU UTAMA ================= -->
  <div id="dashboardCard" class="card-container d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h5 class="header-title mb-0">Dashboard SIDATI</h5>
        <small class="text-muted" id="userGreeting"></small>
      </div>
      <button onclick="logout()" class="btn btn-outline-danger btn-sm fw-bold">Logout</button>
    </div>
    <hr>
    <p class="fw-bold text-center text-secondary mb-4">Silakan Pilih Layanan Penomoran:</p>
    
    <div class="row g-3">
      <div class="col-md-6">
        <div class="menu-card text-center shadow-sm" onclick="bukaForm('spt')">
          <div class="fs-1">📄</div>
          <h6 class="fw-bold mt-2 mb-1">Penomoran SPT</h6>
          <small class="text-muted">Surat Perintah Tugas</small>
        </div>
      </div>
      <div class="col-md-6">
        <div class="menu-card text-center shadow-sm" onclick="bukaForm('sppd')">
          <div class="fs-1">🚘</div>
          <h6 class="fw-bold mt-2 mb-1">Penomoran SPPD</h6>
          <small class="text-muted">Umum & Sekretariat</small>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= 3. FORM PENOMORAN SPT ================= -->
  <div id="sptCard" class="card-container d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="header-title mb-0">Penomoran SPT</h5>
      <button onclick="kembaliKeDashboard()" class="btn btn-secondary btn-sm">⬅️ Kembali</button>
    </div>
    <hr>
    <form id="sptForm">
      <div class="mb-3">
        <label class="form-label fw-bold">Petugas / Pelaksana</label>
        <input type="text" id="sptPetugas" class="form-control bg-light" readonly>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Tanggal Berangkat</label>
          <input type="date" id="sptTglBerangkat" class="form-control" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Tanggal Kembali</label>
          <input type="date" id="sptTglKembali" class="form-control" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Maksud Perjalanan Dinas</label>
        <textarea id="sptMaksud" class="form-control" rows="3" placeholder="Masukkan agenda kegiatan..." required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Tujuan Perjalanan</label>
        <input type="text" id="sptTujuan" class="form-control" placeholder="Contoh: DPRD Prov. Sumbar" required>
      </div>
      <button type="submit" id="btnSubmitSpt" class="btn btn-primary-custom w-100">Generate Nomor SPT</button>
    </form>
    <div id="sptResult" class="text-center d-none mt-4 p-3 bg-light border rounded">
      <h6 class="text-success fw-bold mb-1">Nomor SPT Berhasil Diregistrasi!</h6>
      <div id="sptNomorDisplay" class="nomor-box"></div>
    </div>
  </div>

  <!-- ================= 4. FORM PENOMORAN SPPD ================= -->
  <div id="sppdCard" class="card-container d-none">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="header-title mb-0">Penomoran SPPD</h5>
      <button onclick="kembaliKeDashboard()" class="btn btn-secondary btn-sm">⬅️ Kembali</button>
    </div>
    <hr>
    <form id="sppdForm">
      <div class="mb-3">
        <label class="form-label fw-bold">Kategori / Tab SPPD</label>
        <select id="sppdKategori" class="form-select">
          <option value="umum">SPPD Umum (Tab: Data_SPPD)</option>
          <option value="sekretariat">SPPD Sekretariat (Tab: SPPD_sekretariat)</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Petugas / Pelaksana</label>
        <input type="text" id="sppdPetugas" class="form-control bg-light" readonly>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Nomor SPT Referensi</label>
        <input type="text" id="sppdNoSpt" class="form-control" placeholder="Contoh: 800.1.11.1/1/SET-DPRD/2026" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">Alat Angkut yang Digunakan</label>
        <input type="text" id="sppdAngkut" class="form-control" placeholder="Contoh: Kendaraan Dinas / Umum" required>
      </div>
      <div class="row g-3 mb-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Tempat Berangkat</label>
          <input type="text" id="sppdBerangkat" class="form-control" value="Parit Malintang" required>
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Tempat Tujuan</label>
          <input type="text" id="sppdTujuan" class="form-control" placeholder="Contoh: Padang" required>
        </div>
      </div>
      <button type="submit" id="btnSubmitSppd" class="btn btn-primary-custom w-100">Generate Nomor SPPD</button>
    </form>
    <div id="sppdResult" class="text-center d-none mt-4 p-3 bg-light border rounded">
      <h6 class="text-success fw-bold mb-1">Nomor SPPD Berhasil Diregistrasi!</h6>
      <small class="text-muted" id="sppdTargetInfo"></small>
      <div id="sppdNomorDisplay" class="nomor-box"></div>
    </div>
  </div>

</div>

<script>
  // Ganti URL ini dengan URL Web App Google Apps Script Anda
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby10NOtNauJqMF_XyZVihDZPQn-UGa-1shicEQwDKCNbjEeFr4D7YZtkuLQQbDMMQbI/exec";
  let currentUser = null;

  // Tanggal default hari ini
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('sptTglBerangkat').value = today;
  document.getElementById('sptTglKembali').value = today;

  // --- PROSES LOGIN ---
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnLogin');
    const alertBox = document.getElementById('loginAlert');
    btn.disabled = true;
    btn.innerText = "Memverifikasi...";
    alertBox.classList.add('d-none');

    fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'login',
        nip: document.getElementById('loginNip').value.trim(),
        password: document.getElementById('loginPassword').value.trim()
      })
    })
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      btn.innerText = "Masuk Aplikasi";

      if(data.status === 'success') {
        currentUser = data;
        document.getElementById('loginCard').classList.add('d-none');
        document.getElementById('dashboardCard').classList.remove('d-none');
        document.getElementById('userGreeting').innerText = `${data.nama} (${data.nip})`;
      } else {
        alertBox.innerText = data.message || "NIP atau Password salah!";
        alertBox.classList.remove('d-none');
      }
    })
    .catch(err => {
      btn.disabled = false;
      btn.innerText = "Masuk Aplikasi";
      alertBox.innerText = "Gagal terhubung ke server.";
      alertBox.classList.remove('d-none');
    });
  });

  // --- NAVIGASI ---
  function bukaForm(jenis) {
    document.getElementById('dashboardCard').classList.add('d-none');
    if(jenis === 'spt') {
      document.getElementById('sptPetugas').value = `${currentUser.nama} (${currentUser.nip})`;
      document.getElementById('sptCard').classList.remove('d-none');
    } else if(jenis === 'sppd') {
      document.getElementById('sppdPetugas').value = `${currentUser.nama} (${currentUser.nip})`;
      document.getElementById('sppdCard').classList.remove('d-none');
    }
  }

  function kembaliKeDashboard() {
    document.getElementById('sptCard').classList.add('d-none');
    document.getElementById('sppdCard').classList.add('d-none');
    document.getElementById('sptResult').classList.add('d-none');
    document.getElementById('sppdResult').classList.add('d-none');
    document.getElementById('dashboardCard').classList.remove('d-none');
  }

  function logout() {
    currentUser = null;
    document.getElementById('dashboardCard').classList.add('d-none');
    document.getElementById('loginCard').classList.remove('d-none');
    document.getElementById('loginForm').reset();
  }

  // --- SUBMIT SPT ---
  document.getElementById('sptForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSubmitSpt');
    btn.disabled = true;
    btn.innerText = "Memproses...";

    const payload = {
      action: 'generateSPT',
      petugas: document.getElementById('sptPetugas').value,
      tglBerangkat: document.getElementById('sptTglBerangkat').value,
      tglKembali: document.getElementById('sptTglKembali').value,
      maksud: document.getElementById('sptMaksud').value,
      tujuan: document.getElementById('sptTujuan').value
    };

    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      btn.innerText = "Generate Nomor SPT";
      if(data.status === 'success') {
        document.getElementById('sptNomorDisplay').innerText = data.nomor;
        document.getElementById('sptResult').classList.remove('d-none');
      }
    });
  });

  // --- SUBMIT SPPD ---
  document.getElementById('sppdForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('btnSubmitSppd');
    btn.disabled = true;
    btn.innerText = "Memproses...";

    const kategori = document.getElementById('sppdKategori').value;
    const payload = {
      action: 'generateSPPD',
      kategori: kategori,
      petugas: document.getElementById('sppdPetugas').value,
      noSpt: document.getElementById('sppdNoSpt').value,
      angkut: document.getElementById('sppdAngkut').value,
      berangkat: document.getElementById('sppdBerangkat').value,
      tujuan: document.getElementById('sppdTujuan').value
    };

    fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
    .then(res => res.json())
    .then(data => {
      btn.disabled = false;
      btn.innerText = "Generate Nomor SPPD";
      if(data.status === 'success') {
        document.getElementById('sppdNomorDisplay').innerText = data.nomor;
        document.getElementById('sppdTargetInfo').innerText = `Tersimpan otomatis ke tab: ${data.sheetTujuan}`;
        document.getElementById('sppdResult').classList.remove('d-none');
      }
    });
  });
</script>

</body>
</html>
