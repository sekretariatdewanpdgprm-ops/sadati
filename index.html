<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SADATI - SPT Sekretariat DPRD</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f5; margin: 0; padding: 20px; }
        .card { max-width: 550px; margin: 30px auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-title { text-align: center; color: #003366; border-bottom: 2px solid #003366; padding-bottom: 10px; margin-bottom: 20px; }
        .header-title h2 { margin: 0; font-size: 22px; }
        .header-title p { margin: 5px 0 0; font-size: 13px; color: #555; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; color: #333; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #003366; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #002244; }
        .hidden { display: none; }
        .success-box { background: #e8f8f5; border: 1px solid #2ecc71; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .no-spt { font-size: 20px; font-weight: bold; color: #d35400; background: #fff; padding: 10px; border-radius: 5px; border: 1px dashed #d35400; text-align: center; margin: 10px 0; }
        .user-info { background: #e9f2fe; padding: 10px; border-radius: 6px; font-size: 14px; margin-bottom: 15px; border-left: 4px solid #003366; }
    </style>
</head>
<body>

    <!-- HALAMAN LOGIN NIP -->
    <div id="loginSection" class="card">
        <div class="header-title">
            <h2>SADATI SEKRETARIAT DPRD</h2>
            <p>Sistem Alokasi Digital Penomoran Otomatis</p>
        </div>
        <div class="form-group">
            <label>NIP Staf / Pegawai</label>
            <input type="text" id="loginNip" placeholder="Masukkan NIP Anda">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="Masukkan Password">
        </div>
        <button onclick="prosesLogin()" id="btnLogin">Masuk Aplikasi</button>
    </div>

    <!-- FORM INPUT SPT SEKRETARIAT -->
    <div id="appSection" class="card hidden">
        <div class="header-title">
            <h2>Penomoran SPT Sekretariat</h2>
            <p>Sekretariat DPRD Kabupaten Padang Pariaman</p>
        </div>
        
        <div class="user-info">
            Petugas: <b id="userNama"></b> (<span id="userNip"></span>)
        </div>
        
        <div class="form-group">
            <label>Tanggal SPT / Tanggal Berangkat</label>
            <input type="date" id="sptTanggal">
        </div>
        <div class="form-group">
            <label>Maksud Perjalanan Dinas / Agenda</label>
            <textarea id="sptMaksud" rows="3" placeholder="Contoh: Mengikuti Bimbingan Teknis Tata Naskah Dinas..."></textarea>
        </div>
        <div class="form-group">
            <label>Tujuan Perjalanan Dinas</label>
            <input type="text" id="sptTujuan" placeholder="Contoh: BPKP Perwakilan Prov. Sumbar / Kota Padang">
        </div>
        <button onclick="buatNomorSPT()" id="btnGenerate">Generate Nomor SPT Resmi</button>

        <!-- HASIL PENOMORAN RESMI -->
        <div id="hasilBox" class="success-box hidden">
            <h3 style="margin-top:0; color:#27ae60; text-align:center;">Nomor Berhasil Diregistrasi!</h3>
            <p style="margin-bottom:2px; font-size:13px; text-align:center;">Nomor Surat Perintah Tugas Resmi:</p>
            <div class="no-spt" id="resNoSPT"></div>
            <p style="font-size:13px; margin:5px 0;"><b>Waktu Input:</b> <span id="resWaktu"></span></p>
            <br>
            <button onclick="window.print()" style="background:#27ae60;">🖨️ Cetak Bukti Penomoran (A4)</button>
        </div>
    </div>

    <script>
        // TEMPELKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI SINI
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby10NOtNauJqMF_XyZVihDZPQn-UGa-1shicEQwDKCNbjEeFr4D7YZtkuLQQbDMMQbI/exec"; 

        let userAktif = {};

        function prosesLogin() {
            let nip = document.getElementById("loginNip").value;
            let pass = document.getElementById("loginPass").value;

            if(!nip || !pass) return alert("Silakan isi NIP dan Password!");

            document.getElementById("btnLogin").innerText = "Memverifikasi...";

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "login", nip: nip, password: pass })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("btnLogin").innerText = "Masuk Aplikasi";
                if(data.status === "success") {
                    userAktif = { nip: nip, nama: data.nama };
                    document.getElementById("userNama").innerText = data.nama;
                    document.getElementById("userNip").innerText = nip;
                    document.getElementById("loginSection").classList.add("hidden");
                    document.getElementById("appSection").classList.remove("hidden");
                } else {
                    alert(data.message);
                }
            })
            .catch(err => {
                document.getElementById("btnLogin").innerText = "Masuk Aplikasi";
                alert("Gagal terhubung ke database. Periksa jaringan Anda.");
            });
        }

        function buatNomorSPT() {
            let tgl = document.getElementById("sptTanggal").value;
            let maksud = document.getElementById("sptMaksud").value;
            let tujuan = document.getElementById("sptTujuan").value;

            if(!tgl || !maksud || !tujuan) return alert("Harap lengkapi semua Isian!");

            document.getElementById("btnGenerate").innerText = "Memproses Nomor...";

            fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "createSPT",
                    tanggalSPT: tgl,
                    maksudDinas: maksud,
                    tujuan: tujuan,
                    nipPembuat: userAktif.nip,
                    namaPembuat: userAktif.nama
                })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("btnGenerate").innerText = "Generate Nomor SPT Resmi";
                if(data.status === "success") {
                    document.getElementById("resNoSPT").innerText = data.noSPT;
                    document.getElementById("resWaktu").innerText = data.waktu;
                    document.getElementById("hasilBox").classList.remove("hidden");
                }
            })
            .catch(err => {
                document.getElementById("btnGenerate").innerText = "Generate Nomor SPT Resmi";
                alert("Terjadi kesalahan sistem saat mengambil nomor.");
            });
        }
    </script>
</body>
</html>
